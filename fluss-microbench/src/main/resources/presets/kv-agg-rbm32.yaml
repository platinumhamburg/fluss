meta:
  name: kv-agg-rbm32
  description: "KV table RBM32 – bitmap OR expansion + compaction stress"
  tags: [kv, aggregation, rbm, memory]

cluster:
  tablet-servers: 3
  jvm-args:
    - "-Xmx6g"
    - "-Xms6g"
    - "-XX:MaxDirectMemorySize=2g"
    - "-XX:+UseG1GC"
    - "-XX:MaxGCPauseMillis=50"
    - "-Xlog:gc*:file=/tmp/fluss-rbm-gc.log:time,uptime,level,tags"
  config:
    kv.rocksdb.block-cache-size: "512mb"
    kv.rocksdb.write-buffer-size: "128mb"
    kv.rocksdb.max-write-buffer-number: "4"

client:
  config:
    client.writer.buffer.memory-size: "16mb"
    client.writer.batch-size: "256kb"

table:
  name: rbm_perf
  columns:
    - name: user_id
      type: BIGINT
    - name: visitors
      type: BYTES
      agg: RBM32
  primary-key: [user_id]
  merge-engine: AGGREGATION
  buckets: 9

data:
  seed: 42
  generators:
    user_id:
      type: sequential
      start: 0
      # 1M keys — large key space limits per-key bitmap growth
      # With 5M records, each key gets ~5 ORs, keeping bitmaps small
      end: 1000000
    visitors:
      type: roaring-bitmap-32
      size: 50
      range: [0, 500000]
      distribution: uniform
      overlap: 0.3

workload:
  # RBM32 with 1M keys — record-count for deterministic workload
  # 4M records / 1M keys = avg 4 ORs per key
  - phase: write
    records: 4000000
    threads: 4
  # Phase 2: lookup – stress bitmap deserialization
  - phase: lookup
    warmup: 10000000
    duration: 60s
    threads: 4
    key-range: [0, 1000000]
  # Phase 3: concurrent write + lookup
  - phase: mixed
    warmup: 500000
    duration: 60s
    threads: 4
    mix:
      write: 60
      lookup: 40
  # Phase 4: scan after compaction
  - phase: scan
    warmup: 100
    duration: 60s
    threads: 2

sampling:
  interval: 1s
  nmt: true
  nmtInterval: 5s
  jfr: true
  jfrConfig: "settings=profile"

report:
  formats: [json, csv, html]

thresholds:
  write-tps:
    min: 1000
  rss-peak-mb:
    max: 10000
  heap-mb:
    max: 6000
  p99-ms:
    max: 30000
