meta:
  name: kv-agg-mixed
  description: "KV table mixed write/lookup – SUM/MAX/MIN aggregation contention"
  tags: [kv, aggregation, mixed]

cluster:
  tablet-servers: 3
  jvm-args:
    - "-Xmx4g"
    - "-Xms4g"
    - "-XX:MaxDirectMemorySize=2g"
    - "-XX:+UseG1GC"
    - "-XX:MaxGCPauseMillis=50"
  config:
    kv.rocksdb.block-cache-size: "512mb"
    kv.rocksdb.write-buffer-size: "128mb"
    kv.rocksdb.max-write-buffer-number: "4"

client:
  config:
    client.writer.buffer.memory-size: "16mb"
    client.writer.batch-size: "256kb"

table:
  name: mixed_agg
  columns:
    - name: user_id
      type: BIGINT
    - name: total_amount
      type: DOUBLE
      agg: SUM
    - name: max_score
      type: INT
      agg: MAX
    - name: min_score
      type: INT
      agg: MIN
    - name: is_active
      type: BOOLEAN
      agg: BOOL_OR
  primary-key: [user_id]
  merge-engine: AGGREGATION
  buckets: 12

data:
  seed: 42
  generators:
    user_id:
      type: sequential
      start: 0
      end: 1000000
    total_amount:
      type: random-double
      min: 0.01
      max: 9999.99
    max_score:
      type: random-int
      min: 0
      max: 100
    min_score:
      type: random-int
      min: 0
      max: 100
    is_active:
      type: random-boolean
      true-ratio: 0.7

workload:
  # Phase 1: sustained write – SUM/MAX/MIN aggregation
  - phase: write
    warmup: 500000
    duration: 7m
    threads: 8
  # Phase 2: point lookup on aggregated data
  - phase: lookup
    warmup: 10000
    duration: 2m
    threads: 4
    key-range: [0, 1000000]
  # Phase 3: concurrent write + lookup – worst-case contention
  - phase: mixed
    warmup: 100000
    duration: 2m
    threads: 8
    mix:
      write: 50
      lookup: 50

sampling:
  interval: 1s
  nmt: true
  nmtInterval: 10s
  jfr: true
  jfrConfig: "settings=profile"

report:
  formats: [json, csv, html]

thresholds:
  write-tps:
    min: 30000
  rss-peak-mb:
    max: 8000
  heap-mb:
    max: 4096
  p99-ms:
    max: 5000
